name: Next.js CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.draft == false

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint Commits
        uses: wagoid/commitlint-github-action@v5

      - name: Verify Contributor is Listed
        run: |
          node -e "
            const fs = require('fs');
            const actor = process.env.GITHUB_ACTOR;
            const skipActors = ['dependabot[bot]', 'github-actions[bot]', 'renovate[bot]'];
            
            if (skipActors.includes(actor)) {
              console.log('Skipping validation for bot:', actor);
              process.exit(0);
            }
            
            const data = JSON.parse(fs.readFileSync('contributors.json'));
            if (!data.includes(actor)) {
              console.error(\`\n❌ ACTION REQUIRED: You must add your GitHub username (\${actor}) to contributors.json!\n\`);
              process.exit(1);
            }
            console.log('✅ Contributor validation passed!');
          "
        env:
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Restore Next.js Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Check Code Formatting
        run: npm run format:check

      - name: Run Linter
        run: npm run lint

      - name: Run Unit Tests
        run: npm run test:ci

      - name: Build Production Application
        run: npm run build
