name: Angular Serverless Resume Builder CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Verify Contributor is Listed
        run: |
          node -e "
            const fs = require('fs');
            const actor = process.env.GITHUB_ACTOR;
            const skipActors = ['dependabot[bot]', 'github-actions[bot]', 'renovate[bot]'];
            
            if (skipActors.includes(actor)) {
              console.log('Skipping validation for bot:', actor);
              process.exit(0);
            }
            
            const data = JSON.parse(fs.readFileSync('contributors.json'));
            if (!data.includes(actor)) {
              console.error(\`\n❌ ACTION REQUIRED: You must add your GitHub username (\${actor}) to contributors.json!\n\`);
              process.exit(1);
            }
            console.log('✅ Contributor validation passed!');
          "
        env:
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Check Code Formatting
        run: npm run format:check

      - name: Run Linter
        run: npm run lint

      - name: Run Unit Tests
        run: npm run test -- --watch=false

      - name: Build Production Application
        run: npm run build -- --configuration production
