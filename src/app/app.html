<div class="h-screen bg-brand-base flex flex-col font-sans text-brand-main overflow-hidden">
  <!-- Header -->
  <header
    class="flex-shrink-0 bg-brand-card/90 backdrop-blur-md shadow-md border-b border-brand-border p-4 z-10 flex justify-between items-center"
  >
    <a routerLink="/" class="flex items-center gap-3 group">
      <img
        src="/assets/img/kalelkar-noman-profile.webp"
        alt="Logo"
        class="w-10 h-10 rounded-full border border-brand-accent group-hover:border-brand-main transition-colors"
      />
      <h1
        class="text-xl md:text-2xl font-bold text-brand-main tracking-tight group-hover:text-brand-accent transition-colors"
      >
        Free Resume Builder
        <span class="text-brand-accent group-hover:text-brand-main transition-colors">by KN</span>
      </h1>
    </a>
    <div class="flex gap-4 items-center">
      <!-- Theme Toggle -->
      <button
        (click)="themeService.toggleTheme()"
        class="p-2 rounded-full text-brand-muted hover:bg-brand-card-hover hover:text-brand-accent transition-colors focus:outline-none focus:ring-2 focus:ring-brand-accent focus:ring-offset-2 focus:ring-offset-brand-base"
        [attr.aria-label]="
          themeService.isDarkMode() ? 'Switch to Light Mode' : 'Switch to Dark Mode'
        "
      >
        @if (themeService.isDarkMode()) {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="w-5 h-5"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-2.773-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"
            />
          </svg>
        } @else {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="w-5 h-5"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z"
            />
          </svg>
        }
      </button>

      <a
        href="https://github.com/Kalelkar-Noman/Serverless-Resume-Builder"
        target="_blank"
        class="hidden md:flex items-center gap-1.5 text-brand-muted hover:text-yellow-500 transition-colors text-sm font-medium"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
          class="w-4 h-4 text-yellow-500"
        >
          <path
            fill-rule="evenodd"
            d="M10.788 3.21c.448-1.077 1.976-1.077 2.424 0l2.082 5.007 5.404.433c1.164.093 1.636 1.545.749 2.305l-4.117 3.527 1.257 5.273c.271 1.136-.964 2.033-1.96 1.425L12 18.354 7.373 21.18c-.996.608-2.231-.29-1.96-1.425l1.257-5.273-4.117-3.527c-.887-.76-.415-2.212.749-2.305l5.404-.433 2.082-5.006z"
            clip-rule="evenodd"
          />
        </svg>
        Star us on GitHub
      </a>

      <a
        href="https://kalelkarnoman.netlify.app"
        target="_blank"
        class="hidden md:block text-brand-muted hover:text-brand-main transition-colors text-sm font-medium"
      >
        Portfolio
      </a>
    </div>
  </header>

  <!-- Main Content Route -->
  <div class="flex-1 min-h-0 overflow-y-auto flex flex-col">
    <router-outlet />
  </div>

  <!-- Mobile beta notice -->
  @if (showMobileNotice) {
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40">
      <div class="bg-white dark:bg-gray-900 text-brand-main p-6 rounded-lg max-w-md mx-4 shadow-lg">
        <h2 class="text-lg font-semibold mb-2">Mobile Beta</h2>
        <p class="text-sm mb-4">
          This project is currently in <strong>beta</strong>. For the most stable PDF export
          experience, please use a laptop or desktop.
        </p>
        <div class="flex justify-end">
          <button
            (click)="closeMobileNotice()"
            class="px-4 py-2 bg-brand-accent text-white rounded"
          >
            Got it
          </button>
        </div>
      </div>
    </div>
  }
  <!-- Footer -->
  <footer
    class="flex-shrink-0 bg-brand-card border-t border-brand-border p-4 pb-20 lg:pb-4 text-center text-sm text-brand-muted flex flex-col sm:flex-row justify-center items-center gap-4"
  >
    <span>&copy; 2026 Kalelkar Noman</span>
    <span class="hidden sm:inline text-brand-border">|</span>
    <div class="flex gap-4">
      <a routerLink="/terms" class="hover:text-brand-accent transition-colors">
        Terms & Conditions
      </a>
      <a routerLink="/contact" class="hover:text-brand-accent transition-colors">Contact Us</a>

      <a routerLink="/contributors" class="hover:text-brand-accent transition-colors">
        Contributors
      </a>
    </div>
  </footer>
</div>
